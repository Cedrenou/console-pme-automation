version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        # Propage les env vars Amplify configurées dans la console
        # (SHOPIFY_MIDDLEWARE_*, NEXT_PUBLIC_*) vers un .env.production
        # que Next.js lit au build. Sans ça, les API routes SSR voient
        # `process.env.XXX === undefined` au runtime sur Amplify Hosting.
        - env | grep -E '^(SHOPIFY_MIDDLEWARE_|NEXT_PUBLIC_)' >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '**/*'
      headers:
        - key: 'Strict-Transport-Security'
          value: 'max-age=31536000; includeSubDomains'
        - key: 'X-Frame-Options'
          value: 'DENY'
        - key: 'X-Content-Type-Options'
          value: 'nosniff'
        - key: 'Referrer-Policy'
          value: 'strict-origin-when-cross-origin' 